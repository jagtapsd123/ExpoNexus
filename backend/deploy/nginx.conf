# /etc/nginx/sites-available/stall-booker
# Symlink: ln -s /etc/nginx/sites-available/stall-booker /etc/nginx/sites-enabled/

upstream stall_booker_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.amrutpeth.com;
    return 301 https://$host$request_uri;
}

# HTTPS — API
server {
    listen 443 ssl http2;
    server_name api.amrutpeth.com;

    # --- TLS (replace with your cert paths from Certbot / ACM) ---
    ssl_certificate     /etc/letsencrypt/live/api.amrutpeth.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.amrutpeth.com/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # --- Security headers ---
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Referrer-Policy           "no-referrer-when-downgrade";

    # --- Proxy settings ---
    proxy_http_version 1.1;
    proxy_set_header Connection         "";
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_connect_timeout  60s;
    proxy_send_timeout     120s;
    proxy_read_timeout     120s;

    # --- Upload size (match Spring multipart limit) ---
    client_max_body_size 15M;

    # --- API proxy ---
    location /api/ {
        proxy_pass http://stall_booker_backend;
    }

    # --- Actuator — restrict to internal only ---
    location /actuator/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny  all;
        proxy_pass http://stall_booker_backend;
    }

    # --- Swagger — disable in production (application-prod.yml already does this,
    #     but double-gate at Nginx level) ---
    location ~ ^/(swagger-ui|v3/api-docs) {
        deny all;
        return 404;
    }

    # --- Health check (public) ---
    location /actuator/health {
        allow all;
        proxy_pass http://stall_booker_backend;
    }

    # --- Static frontend (if served from same server) ---
    # location / {
    #     root /var/www/stall-booker-frontend/dist;
    #     try_files $uri $uri/ /index.html;
    #     expires 1y;
    #     add_header Cache-Control "public, immutable";
    # }
}
