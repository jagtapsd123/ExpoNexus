# DataSource - PostgreSQL (prod values come from env vars)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/stall_booker}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# HikariCP pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=StallBookerHikariPool

# JPA
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# Static resources
spring.web.resources.add-mappings=false

# Server
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# Logging
logging.level.root=WARN
logging.level.com.amrut.peth.stallbooker=INFO
logging.level.org.springframework.security=WARN
logging.file.name=/var/log/stall-booker/application.log

# Actuator
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized

# Swagger (disabled in prod)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
