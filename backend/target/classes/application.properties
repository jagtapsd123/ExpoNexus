spring.application.name=stall-booker
spring.profiles.active=dev

# DataSource - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/stall_booker
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_batch_fetch_size=20
	
# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=true

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Mail
spring.mail.host=${MAIL_HOST:email-smtp.ap-south-1.amazonaws.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
app.jwt.secret=${JWT_SECRET:change-me-to-a-very-long-random-base64-string-at-least-64-chars}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# CORS
app.cors.allowed-origins[0]=http://localhost:5173
app.cors.allowed-origins[1]=http://localhost:3000
app.cors.allowed-origins[2]=http://localhost:4200

# File storage (local filesystem — set app.storage=s3 to switch to S3)
app.storage=local
app.upload.dir=uploads
app.base-url=http://localhost:8080

# AWS S3 (only used when app.storage=s3)
aws.access-key=${AWS_ACCESS_KEY:test}
aws.secret-key=${AWS_SECRET_KEY:test}
aws.s3.bucket=${AWS_S3_BUCKET:testbucket}
aws.s3.region=${AWS_S3_REGION:ap-south-1}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
