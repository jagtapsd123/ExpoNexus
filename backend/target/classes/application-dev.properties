# AWS (override with real values via env vars)
aws.access-key=${AWS_ACCESS_KEY:test}
aws.secret-key=${AWS_SECRET_KEY:test}
aws.s3.bucket=${AWS_S3_BUCKET:testbucket}
aws.s3.region=${AWS_S3_REGION:ap-south-1}

# JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true

# Logging
logging.level.com.amrut.peth.stallbooker=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
